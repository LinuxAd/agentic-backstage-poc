apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backstage
  namespace: {{ .Release.Namespace }}
  labels:
    app: backstage
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    # No host => catch-all, so http://localhost:3000 matches regardless of Host header.
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backstage
                port:
                  number: {{ .Values.service.port }}
